services:
  db:
    image: postgres:17
    env_file:
      - ${ENV_FILE:-backend/env/.env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    restart: on-failure:3

  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfiles/Dockerfile.dev
    depends_on:
      - db
    env_file:
      - ${ENV_FILE:-backend/env/.env}
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: on-failure:3


  pgadmin:
    image: dpage/pgadmin4:9
    env_file:
      - ${ENV_FILE:-backend/env/.env}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network
    restart: on-failure:3

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfiles/Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/env/.env
    networks:
      - app-network
    restart: on-failure:3

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge